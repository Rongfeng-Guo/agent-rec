name: cpu-smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Run validity gate
        run: >
          python -B -m user_simulator.evaluation.run_validity_gate
          --modes none flat structured time_decay critiquescope
          --scenarios all
          --seeds 0 1
          --max-turns 12
          --top-k 5
          --output-dir outputs/ci_validity_gate
          --fail-on-critical-invariant

      - name: Compile user_simulator
        run: python -m compileall user_simulator
