active_hypothesis:
  id: H5
  slug: candidate-level-source-reranker
  question: >
    Can a candidate-level reranker use per-source rank/score, route confidence,
    source presence, and agreement features to move pool-hit targets from deep
    candidate ranks into the top-50?
  prediction: >
    H4 showed that sample-level source weighting is insufficient: pool entry can
    reach 0.919118, but Recall@50 remains 0.029412 and oracle best-single-source
    Hit@50 is only 0.0956. Candidate-level features may still recover targets by
    combining source evidence instead of selecting one source globally per
    sample.
  status: in_progress
  result: >
    H5 exporter completed with 1,888,938 train candidate rows and 345,969
    cold-like candidate rows. Pointwise SGD rankers were negative, but pairwise
    linear ranking improved: h100/e20 matched H3 at Recall@50 0.044118, h300/e30
    reached 0.051471, and a validation-only domain-routed policy
    (Book->h100/e20, Game->h300/e30) reached 0.073529. The H5-D manifest is now
    locked for validation comparison, and seed/nearby-hard-negative checks were
    stable enough to keep H5-D as the current selected validation candidate. The
    locked manifest validator recomputes the selected metrics from output rows.
    This is validation-only and not a fresh blind-confirmation claim.
